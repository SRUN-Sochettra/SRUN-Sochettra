  </text>
  <text x="1216" y="68" text-anchor="end" class="mono" fill="#57534e" font-size="10" letter-spacing="0.1em" opacity="0.8">refreshed 2026-07-24 01:55 UTC</text>

  <!-- ===== LEFT: persona ===== -->
  <text x="64" y="188" class="khmer" fill="#60a5fa" font-size="72">សួស្តី</text>

  <text x="64" y="258" class="display" fill="#fafaf9" font-size="56" letter-spacing="-0.025em">
    Srun Sochettra
  </text>

