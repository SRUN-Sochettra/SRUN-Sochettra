    <text x="810" y="156" class="sans" fill="#fafaf9" font-size="15" font-weight="600">Toradora!</text>
    <text x="810" y="176" class="mono" fill="#a8a29e" font-size="10" letter-spacing="0.05em">Ep 17 / 25  ·  via AniList</text>
  

  <text x="810" y="212" class="mono" fill="#d6d3d1" font-size="10" font-weight="700" letter-spacing="0.25em">NOW PLAYING</text>
  <text x="810" y="238" class="sans" fill="#fafaf9" font-size="15" font-weight="600">Magic Chess  ·  eFootball  ·  Football Manager</text>

  <text x="810" y="290" class="mono" fill="#d6d3d1" font-size="10" font-weight="700" letter-spacing="0.25em">LAST SHIPPED</text>
  
    <text x="810" y="316" class="sans" fill="#fafaf9" font-size="15" font-weight="600">HyperspaceOS</text>
