name: Update README

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Generate live banner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-banner.mjs

      - name: Run README updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: npm run update

      - name: Commit if changed
        run: |
          git add README.md assets/banner-dark.svg assets/banner-light.svg
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "readme-bot"
          git config user.email "actions@github.com"
          git commit -m "chore(readme): auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Rebase-and-retry push to handle concurrent commits from metrics workflow
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep $((i * 5))
          done
          echo "::error::push failed after 3 attempts"
          exit 1
