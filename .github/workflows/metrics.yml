name: Generate Metrics

on:
    schedule:
        - cron: "30 */6 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    metrics:
        runs-on: ubuntu-latest
        steps:
            # ============================================================
            # 1) THE CODER — languages, topics
            # ============================================================
            - name: Coder metrics
              uses: lowlighter/metrics@latest
              with:
                  filename: assets/metrics-coder.svg
                  token: ${{ secrets.METRICS_TOKEN }}
                  committer_token: ${{ secrets.GITHUB_TOKEN }}

                  user: SRUN-Sochettra
                  template: classic
                  base: header, activity, community, repositories
                  config_display: large
                  config_padding: 8, 3%
                  config_timezone: Asia/Phnom_Penh

                  plugin_languages: yes
                  plugin_languages_categories: markup, programming
                  plugin_languages_colors: github
                  plugin_languages_indepth: yes
                  plugin_languages_limit: 8
                  plugin_languages_recent_categories: markup, programming
                  plugin_languages_recent_days: 30
                  plugin_languages_recent_load: 600
                  plugin_languages_sections: most-used, recently-used
                  plugin_languages_threshold: 0%

                  plugin_topics: yes
                  plugin_topics_limit: 0
                  plugin_topics_mode: icons

            # ============================================================
            # 2) THE PERSON — anime, manga, characters, stars, followers
            # ============================================================
            - name: Person metrics
              uses: lowlighter/metrics@latest
              with:
                  filename: assets/metrics-person.svg
                  token: ${{ secrets.METRICS_TOKEN }}
                  committer_token: ${{ secrets.GITHUB_TOKEN }}

                  user: SRUN-Sochettra
                  template: classic
                  base: ""
                  config_display: large
                  config_padding: 8, 3%
                  config_timezone: Asia/Phnom_Penh

                  plugin_anilist: yes
                  plugin_anilist_user: scarletsages
                  plugin_anilist_medias: anime, manga
                  plugin_anilist_sections: characters, watching, reading, favorites
                  plugin_anilist_limit: 3
                  plugin_anilist_shuffle: yes
                  plugin_anilist_limit_characters: 22

                  plugin_stars: yes
                  plugin_stars_limit: 6

                  plugin_people: yes
                  plugin_people_types: followers, following
                  plugin_people_limit: 28
                  plugin_people_size: 32

            # ============================================================
            # 3) THE NUMBERS — followup, isocalendar, achievements
            # ============================================================
            - name: Data metrics
              uses: lowlighter/metrics@latest
              with:
                  filename: assets/metrics-data.svg
                  token: ${{ secrets.METRICS_TOKEN }}
                  committer_token: ${{ secrets.GITHUB_TOKEN }}

                  user: SRUN-Sochettra
                  template: classic
                  base: ""
                  config_display: large
                  config_padding: 8, 3%
                  config_timezone: Asia/Phnom_Penh

                  plugin_followup: yes
                  plugin_followup_sections: repositories

                  plugin_isocalendar: yes
                  plugin_isocalendar_duration: full-year

                  plugin_achievements: yes
                  plugin_achievements_display: detailed
                  plugin_achievements_secrets: yes
                  plugin_achievements_threshold: C

            # ============================================================
            # 4) TROPHIES — cached locally to avoid camo/Vercel failures
            # ============================================================
            - name: Cache trophies SVG
              run: |
                  mkdir -p assets
                  curl -fsSL --retry 3 --retry-delay 5 \
                    "https://github-profile-trophy.vercel.app/?username=SRUN-Sochettra&rank=SECRET,SSS,SS,S,AAA,AA&row=2&column=9&theme=darkhub&no-bg=true&no-frame=true" \
                    -o assets/trophies.svg

            - name: Commit trophies
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  file_pattern: assets/trophies.svg
                  commit_message: "chore: refresh trophies"
