name: Generate Metrics

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-update
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ================================================================
      # CODER row A — left card: languages
      # ================================================================
      - name: Languages metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh
          plugin_languages: yes
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 600
          plugin_languages_sections: most-used, recently-used
          plugin_languages_threshold: 0%

      # ================================================================
      # CODER row A — right card: header + activity + community + repos + topics
      # ================================================================
      - name: Activity metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: header, activity, community, repositories
          config_display: large
          config_padding: 8, 3%
          config_timezone: Asia/Phnom_Penh
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons

      # ================================================================
      # PERSON row A — left card: anilist
      # ================================================================
      - name: Anilist metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-anilist.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh
          plugin_anilist: yes
          plugin_anilist_user: scarletsages
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: characters, watching, reading, favorites
          plugin_anilist_limit: 1
          plugin_anilist_shuffle: yes
          plugin_anilist_limit_characters: 22

      # ================================================================
      # PERSON row A — right card: stars + people
      # ================================================================
      - name: Social metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-social.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh

          plugin_stars: yes
          plugin_stars_limit: 6

          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28
          plugin_people_size: 32

      # ================================================================
      # NUMBERS row A — left card: isocalendar full year
      # ================================================================
      - name: Isocalendar metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-iso.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12+2%
          config_timezone: Asia/Phnom_Penh
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ================================================================
      # NUMBERS row A — right card: followup + calendar
      # ================================================================
      - name: Followup metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-followup.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh

          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes
          plugin_followup_archived: yes

          plugin_calendar: yes
          plugin_calendar_limit: 2