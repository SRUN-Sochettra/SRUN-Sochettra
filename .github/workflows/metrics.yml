name: Generate Metrics

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-update
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ================================================================
      # WORK — languages
      # ================================================================
      - name: Languages metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh
          plugin_languages: yes
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 600
          plugin_languages_sections: most-used, recently-used
          plugin_languages_threshold: 0%

      # ================================================================
      # WORK — activity, repos, topics
      # ================================================================
      - name: Activity metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: header, activity, repositories
          config_display: large
          config_padding: 8, 3%
          config_timezone: Asia/Phnom_Penh
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons

      # ================================================================
      # LIFE — anilist (currently watching + reading + favorites)
      # ================================================================
      - name: Anilist metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-anilist.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh
          plugin_anilist: yes
          plugin_anilist_user: scarletsages
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: characters, watching, reading, favorites
          plugin_anilist_limit: 2
          plugin_anilist_shuffle: yes
          plugin_anilist_limit_characters: 22

      # ================================================================
      # LIFE — social (stars + people avatars)
      # ================================================================
      - name: Social metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-social.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh

          plugin_stars: yes
          plugin_stars_limit: 6

          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28
          plugin_people_size: 32

      # ================================================================
      # STATS — isocalendar full year
      # ================================================================
      - name: Isocalendar metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-iso.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12+2%
          config_timezone: Asia/Phnom_Penh
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ================================================================
      # STATS — habits (peak hours, avg commit time, coding facts)
      # This is one of lowlighter's most beautiful plugins.
      # ================================================================
      - name: Habits metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

      # ================================================================
      # STATS — followup + calendar
      # ================================================================
      - name: Followup metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-followup.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh

          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes
          plugin_followup_archived: yes

          plugin_calendar: yes
          plugin_calendar_limit: 2

      # ================================================================
      # STATS — achievements (badge wall)
      # ================================================================
      - name: Achievements metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh

          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_achievements_limit: 12
          plugin_achievements_ignored: maintainer, member, octonaut