name: Generate Metrics

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-update
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # 1) THE CODER — UNCHANGED FROM v1 (debugging yourself)
      # ============================================================
      - name: Coder metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-coder.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: header, activity, community, repositories
          config_display: large
          config_padding: 8, 3%
          config_timezone: Asia/Phnom_Penh
          plugin_languages: yes
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 600
          plugin_languages_sections: most-used, recently-used
          plugin_languages_threshold: 0%
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons

      # ============================================================
      # 2) THE PERSON — padding + anilist limit fixed
      # ============================================================
      - name: Person metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-person.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 16+8%
          config_timezone: Asia/Phnom_Penh

          plugin_anilist: yes
          plugin_anilist_user: scarletsages
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: characters, watching, reading, favorites
          plugin_anilist_limit: 1
          plugin_anilist_shuffle: yes
          plugin_anilist_limit_characters: 22

          plugin_stars: yes
          plugin_stars_limit: 6

          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28
          plugin_people_size: 32

      # ============================================================
      # 3) THE NUMBERS — calendar added to fill blank column
      # ============================================================
      - name: Data metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: assets/metrics-data.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: SRUN-Sochettra
          template: classic
          base: ""
          config_display: large
          config_padding: 0, 12%
          config_timezone: Asia/Phnom_Penh

          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes
          plugin_followup_archived: yes

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_calendar: yes
          plugin_calendar_limit: 2

          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_achievements_limit: 12
          plugin_achievements_ignored: maintainer, member, octonaut
